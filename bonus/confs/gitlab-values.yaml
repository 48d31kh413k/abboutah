# Minimal GitLab Helm Chart values for K3d local deployment
global:
  host: gitlab.local
  https: false
  ingress:
    enabled: false
  certManager:
    enabled: false

gitlab:
  webservice:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

gitlab-runner:
  enabled: false

postgresql:
  enabled: true
  auth:
    password: "gitlab-postgres-password"
  primary:
    persistence:
      enabled: false

redis:
  install: true
  replica:
    replicaCount: 0
  master:
    persistence:
      enabled: false

prometheus:
  enabled: false

certmanager-issuer:
  email: admin@gitlab.local

nginx-ingress:
  enabled: false

registry:
  enabled: false
