# Minimal GitLab Helm Chart values for K3d local deployment - Ultra-Lightweight Configuration
global:
  host: gitlab.local
  https: false
  ingress:
    enabled: false
  certManager:
    enabled: false
  minio:
    enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

gitlab:
  # Minimize webservice
  webservice:
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    minReplicas: 1
    maxReplicas: 1
    hpa:
      enabled: false
  
  # Disable sidekiq completely
  sidekiq:
    replicaCount: 0
    enabled: false
  
  # Minimal gitaly
  gitaly:
    replicaCount: 1
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  
  # Minimal shell
  shell:
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# Explicitly disable runners
gitlab-runner:
  enabled: false
  replicas: 0

# Ultra-minimal database
postgresql:
  enabled: true
  auth:
    password: "gitlab-postgres-password"
  primary:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

# Minimal redis
redis:
  install: true
  replica:
    replicaCount: 0
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

# Minio (object storage)
minio:
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

prometheus:
  enabled: false

certmanager-issuer:
  enabled: false
  email: admin@gitlab.local

nginx-ingress:
  enabled: false

registry:
  enabled: false

certmanager:
  enabled: false

grafana:
  enabled: false

gitlab-exporter:
  enabled: false

kas:
  enabled: false

# Global pod disruption budget disable
podDisruptionBudget:
  enabled: false
