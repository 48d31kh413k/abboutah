# Minimal GitLab Helm values for local K3d bonus setup
installCertmanager: false

global:
  edition: ce
  hosts:
    domain: gitlab.local
  ingress:
    enabled: false
    configureCertmanager: false
  initialRootPassword:
    secret: gitlab-initial-root-password

gitlab:
  webservice:
    service:
      type: ClusterIP
      externalPort: 80

nginx-ingress:
  enabled: false

prometheus:
  install: false

gitlab-runner:
  install: false

registry:
  enabled: false

minio:
  persistence:
    enabled: false

redis:
  master:
    persistence:
      enabled: false

postgresql:
  primary:
    persistence:
      enabled: false
