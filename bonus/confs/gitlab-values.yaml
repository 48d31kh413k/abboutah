global:
  edition: ce  # Community Edition

  hosts:
    domain: localhost  # Use localhost for GitLab
    https: false  # Disable HTTPS

  ingress:
    enabled: false  # No ingress controller
    configureCertmanager: false  # No cert-manager

  initialRootPassword:
    secret: gitlab-initial-root-password  # Secret for root password

installCertmanager: false  # Do not install cert-manager

gitlab:
  webservice:
    service:
      type: ClusterIP  # Internal service
      externalPort: 80  # Expose on port 80

nginx-ingress:
  enabled: false  # Disable nginx ingress

prometheus:
  install: false  # Disable Prometheus

gitlab-runner:
  install: false  # Disable GitLab Runner

registry:
  enabled: false  # Disable container registry

minio:
  persistence:
    enabled: false  # Disable MinIO persistence

redis:
  master:
    persistence:
      enabled: false  # Disable Redis persistence

postgresql:
  primary:
    persistence:
      enabled: false  # Disable PostgreSQL persistence