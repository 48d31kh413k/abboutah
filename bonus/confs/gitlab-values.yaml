# Minimal GitLab Helm Chart values for K3d local deployment - Lightweight Configuration
global:
  host: gitlab.local
  https: false
  ingress:
    enabled: false
  certManager:
    enabled: false

gitlab:
  # Minimize webservice
  webservice:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    minReplicas: 1
    maxReplicas: 1
  
  # Minimal sidekiq
  sidekiq:
    replicaCount: 0
  
  # Disable extras
  gitaly:
    replicaCount: 1
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  
  shell:
    replicaCount: 1

# Disable all runners
gitlab-runner:
  enabled: false

# Minimal database
postgresql:
  enabled: true
  auth:
    password: "gitlab-postgres-password"
  primary:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

# Minimal redis
redis:
  install: true
  replica:
    replicaCount: 0
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# Disable heavy components
prometheus:
  enabled: false

certmanager-issuer:
  enabled: false
  email: admin@gitlab.local

nginx-ingress:
  enabled: false

registry:
  enabled: false

certmanager:
  enabled: false

# Disable monitoring and logging
grafana:
  enabled: false

gitlab-exporter:
  enabled: false

# Disable KAS (Kubernetes Agent Server)
kas:
  enabled: false
