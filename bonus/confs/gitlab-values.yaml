global:
  edition: ce

  hosts:
    domain: localhost
    https: false

  ingress:
    enabled: false
    configureCertmanager: false

  initialRootPassword:
    secret: gitlab-initial-root-password

installCertmanager: false

gitlab:
  webservice:
    service:
      type: ClusterIP
      externalPort: 80

nginx-ingress:
  enabled: false

prometheus:
  install: false

gitlab-runner:
  install: false

registry:
  enabled: false

minio:
  persistence:
    enabled: false

redis:
  master:
    persistence:
      enabled: false

postgresql:
  primary:
    persistence:
      enabled: false