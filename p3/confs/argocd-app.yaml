# FILE: argocd-app.yaml
# PURPOSE: Register the playground workload in Argo CD so the dev namespace stays synced from Git.
# USAGE: Applied by scripts/install.sh or manually with kubectl apply -f confs/argocd-app.yaml
# NOTES: Replace the placeholder repo URL or provide REPO_URL when running the installer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/48d31kh413k/Inception-of-things
    targetRevision: HEAD
    path: confs/
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
