apiVersion: v1  # Core Kubernetes API
kind: Namespace  # Resource type - creates a virtual cluster
metadata:
  name: argocd  # System namespace for Argo CD components
---
# Namespace for application workloads
apiVersion: v1  # Core Kubernetes API
kind: Namespace  # Resource type - creates a virtual cluster
metadata:
  name: dev  # Application namespace - isolated from system
