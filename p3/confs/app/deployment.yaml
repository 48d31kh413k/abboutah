# Deployment: Manages the playground application pods
apiVersion: apps/v1  # Kubernetes apps API
kind: Deployment  # Resource type - ensures desired number of replicas run
metadata:
  name: playground  # Deployment name
  namespace: dev  # Deploy to dev namespace
spec:
  replicas: 1  # Run exactly 1 replica of the app
  selector:
    matchLabels:
      app: playground  # Find pods with this label
  template:
    metadata:
      labels:
        app: playground  # Label pods so service can find them
    spec:
      containers:
        - name: playground  # Container name
          image: wil42/playground:v2 # Docker image to run
          imagePullPolicy: Always  # Always pull the latest image
          ports:
            - containerPort: 8888  # Container listens on port 8888
---
# Service: Exposes the playground application
apiVersion: v1  # Core Kubernetes API
kind: Service  # Resource type - network endpoint for pods
metadata:
  name: playground  # Service name
  namespace: dev  # In dev namespace
spec:
  selector:
    app: playground  # Route traffic to pods with this label
  ports:
    - port: 8888  # Service port (external)
      targetPort: 8888  # Pod port (internal)
