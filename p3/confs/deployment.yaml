# FILE: deployment.yaml
# PURPOSE: Define the playground workload and its in-cluster service in the dev namespace.
# USAGE: Managed by Argo CD from confs/; manual apply remains possible with kubectl apply -f confs/deployment.yaml
# NOTES: Change the image tag from v1 to v2 to test automated sync and rollout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playground
  template:
    metadata:
      labels:
        app: playground
    spec:
      containers:
        - name: playground
          image: wil42/playground:v1
          ports:
            - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: playground
  namespace: dev
spec:
  selector:
    app: playground
  ports:
    - port: 8888
      targetPort: 8888